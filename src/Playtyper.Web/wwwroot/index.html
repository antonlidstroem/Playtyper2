<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Playtyper</title>
    <base href="/" />

    <!-- Måste ligga FÖRE CSS-länken och köras synkront (ingen defer) — se
         filens egen kommentar. Sätter data-theme på <html> innan
         webbläsaren målar något, annars blinkar fel läge kort. -->
    <script src="_content/Playtyper.Shared/js/theme-boot.js"></script>

    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#171310" />

    <link rel="stylesheet" href="_content/Playtyper.Shared/css/app.css" />
</head>
<body>
    <!-- Inline-färger nedan (inte CSS-variabler) med flit: den här skärmen
         syns INNAN app.css och Blazor hunnit ladda, så den kan inte förlita
         sig på var(--color-*) — men värdena är samma koppar-palett som
         resten av appen, inte kvarglömda från den gamla gröna paletten. -->
    <div id="app">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100vh;font-family:sans-serif;color:#c9b8a6;background:#171310">
            <img src="_content/Playtyper.Shared/img/logo.png" alt="" style="height:64px;width:auto" />
            <span>Laddar Playtyper…</span>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#fae3df;color:#a3352a;padding:10px 16px;font-family:sans-serif;font-size:13px;">
        Något gick fel. <a href="" style="color:inherit;text-decoration:underline">Ladda om</a>
        <button style="float:right;background:none;border:none;cursor:pointer;color:inherit" onclick="this.parentElement.style.display='none'">✕</button>
    </div>

    <script src="_content/Playtyper.Shared/js/interop.js"></script>
    <script src="_content/Playtyper.Shared/js/preview-bridge.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
